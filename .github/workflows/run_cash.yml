name: AgentWallet CASH Runner

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore balance cache
        uses: actions/cache@v4
        with:
          path: |
            /tmp/agentwallet_reward_bal.txt
            /tmp/agentwallet_own_cash.txt
          key: balance-cache-${{ github.run_id }}
          restore-keys: balance-cache-

      - name: Run ALL CASH payments
        env:
          AGENTWALLET_API_TOKEN: ${{ secrets.AGENTWALLET_API_TOKEN }}
          AGENTWALLET_USERNAME:  ${{ secrets.AGENTWALLET_USERNAME }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bash cash_all.sh

      - name: Save balance cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            /tmp/agentwallet_reward_bal.txt
            /tmp/agentwallet_own_cash.txt
          key: balance-cache-${{ github.run_id }}
